<label class="ur-field ur-field-input" [class.is-invalid]="isInvalid()" [class.is-disabled]="disabled">
    <ur-label [label]="label" [required]="!!validation().required"></ur-label>
    <div class="time-field">
        <input
            data-keyboard-layout="numeric-fixed-positive"
            type="time"
            [id]="inputId"
            [value]="value"
            [min]="min()"
            [max]="max()"
            [step]="sec()"
            [required]="required()"
            [disabled]="disabled"
            (focus)="onFocus($event)"
            (blur)="onBlur($event)"
            (input)="onInput($event)"
        />
        <ur-icon class="icon" size="small" icon="pencil"></ur-icon>
    </div>
    <span class="ur-input-message-container ur-row ur-justify-top">
        @if (validationMessage(); as msg) {
            <ur-helper-message class="ur-helper-message ur-column ur-align-left" type="error" [message]="msg"></ur-helper-message>
        }
    </span>
    <ur-label
        class="time-format"
        [label]="(isTeachPendant() ? 'ui.time.format12h' : 'ui.time.format24h') | translate"
        [required]="false"
        [size]="'small'"
    ></ur-label>
</label>
