<svg xmlns:xlink="http://www.w3.org/1999/xlink" class="ur-icon-base">
    <svg:use [attr.xlink:href]="'svg-sprite/symbols.svg' + '#' + iconName"></svg:use>
</svg>
@if (badgeIcon && badgeVisible) {
    <svg xmlns:xlink="http://www.w3.org/1999/xlink" class="ur-icon-badge">
        <svg:use [attr.xlink:href]="'svg-sprite/symbols.svg' + '#' + badgeIcon"></svg:use>
    </svg>
}
