<label aria-label="robot speed slider" [style.width]="width()">
    <input
        type="range"
        [max]="max()"
        [min]="min()"
        [step]="step()"
        [value]="level()"
        (input)="inputChanged($event)"
        (change)="valueChanged($event)"
        [disabled]="disabled()"
        data-testid="speed-input"
    />
</label>
